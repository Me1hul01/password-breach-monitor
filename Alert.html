<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Breach Alert</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
        h1 {
            color: #d9534f;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #333333;
            font-size: 16px;
            line-height: 1.5;
        }
        .details-box {
            background-color: #e9ecef;
            border-left: 4px solid #d9534f;
            padding: 10px;
            margin-top: 15px;
            font-size: 15px;
            color: #222;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777777;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Password Breach Detected!</h1>
        <p>.</p>

        <div class="details-box">
            <strong>Details:</strong> $alert
            Last Checked: $present_time.
            Source: Have I Been Pwned API.
        </div>

        <div class="footer">
            <p>This is an automated alert from your breach checker project.</p>
        </div>
    </div>
</body>
</html>
